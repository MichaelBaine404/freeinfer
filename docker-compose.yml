# Complete local AI stack: FreeInfer FastAPI + Ollama with one command
version: '3.8'

services:
  freeinfer:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    env_file: .env

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
